<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Submit Story - Worldwide Life Matter</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="top-header">
  <div class="logo">🌍 Worldwide Life Matter</div>
</header>

<main>
  <h1>Share Your Story</h1>

  <form id="story-form">
    <input type="text" id="title" placeholder="Story Title" required>
    <br><br>

    <textarea id="content" placeholder="Write your story here..." rows="8" required></textarea>
    <br><br>

    <input type="text" id="author" placeholder="Your Name (optional)">
    <br><br>

    <button type="submit">Submit Story</button>
  </form>

  <p id="message"></p>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<script src="submit.js"></script>

</body>
</html>
